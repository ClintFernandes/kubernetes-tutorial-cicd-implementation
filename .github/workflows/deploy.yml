# .github/workflows/deploy.yml
name: Build, Push & Deploy

on:
  push:
    branches:
      - main
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # ── 1. Checkout code ──────────────────────────────────────
    - name: Checkout code
      uses: actions/checkout@v4

    # ── 2. Set image tag from git commit SHA ──────────────────
    - name: Set image tag
      run: echo "IMAGE_TAG=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV
      # e.g. IMAGE_TAG=a1b2c3d — unique per commit

    # ── 3. Login to Docker Hub ────────────────────────────────
    - name: Log in to Docker Hub
      uses: docker/login-action@v3.3.0
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # ── 4. Build Docker image ─────────────────────────────────
    - name: Build Docker image
      env:
        IMAGE_NAME: ${{ vars.DOCKER_USERNAME }}/my-k8s-app
      run: |
        docker build -t $IMAGE_NAME:$IMAGE_TAG .
        docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:latest

    # ── 5. Push to Docker Hub ─────────────────────────────────
    - name: Push Docker image
      env:
        IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/my-k8s-app
      run: |
        docker push $IMAGE_NAME:$IMAGE_TAG
        docker push $IMAGE_NAME:latest

    # ── 6. Inject image tag into deployment.yaml ──────────────
    - name: Update deployment.yaml with new image tag
      env:
        IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/my-k8s-app
      run: |
        sed -i "s|IMAGE_TAG|$IMAGE_TAG|g" k8s/deployment.yaml
        sed -i "s|your-dockerhub-username|${{ secrets.DOCKER_USERNAME }}|g" k8s/deployment.yaml

    # ── 7. Set up kubectl ─────────────────────────────────────
    - name: Set up kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: 'latest'

    # ── 8. Configure kubeconfig ───────────────────────────────
    - name: Configure kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > $HOME/.kube/config

    # ── 9. Deploy to Kubernetes ───────────────────────────────
    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f k8s/deployment.yaml
        kubectl apply -f k8s/service.yaml
        kubectl rollout status deployment/my-k8s-app
